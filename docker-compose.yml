services:
  industrial-vision-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: industrial-vision-inspection:step15
    container_name: industrial_vision_api
    ports:
      - "${INDUSTRIAL_VISION_API_PORT:-8001}:8001"
    environment:
      INDUSTRIAL_VISION_MODEL_PATH: /app/outputs/predictions/step12_model_persistence/step12_random_forest_model.joblib
    volumes:
      - ./outputs:/app/outputs
      - ./data:/app/data
    command:
      - uvicorn
      - industrial_vision.dashboard:app
      - --host
      - 0.0.0.0
      - --port
      - "8001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8001/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
